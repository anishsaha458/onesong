<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneSong</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- GPGPU canvas — z-index:-1, behind everything -->
  <canvas id="ambient-canvas"></canvas>

  <!-- Headless audio -->
  <audio id="headless-audio" preload="metadata"></audio>

  <!-- ── LOADING VEIL ──────────────────────────────────── -->
  <div id="loading-veil" class="veil">
    <div class="veil-scanner"></div>
    <p id="loading-msg">INITIALIZING</p>
  </div>

  <!-- ── AUTH OVERLAY ──────────────────────────────────── -->
  <div id="auth-container" class="overlay-wrap">
    <div class="hud-panel auth-panel">

      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="1"/>
          <path d="M15 13 L15 27 L29 20 Z" fill="currentColor"/>
        </svg>
        <span class="brand-name">ONESONG</span>
      </div>

      <!-- Login -->
      <div id="login-form">
        <h2 class="panel-heading">SIGN IN</h2>
        <p class="panel-sub">Your one song. Always playing.</p>
        <div class="field-group">
          <label class="field-label">EMAIL</label>
          <input id="login-email" type="email" class="field-input" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field-group">
          <label class="field-label">PASSWORD</label>
          <input id="login-password" type="password" class="field-input" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') login()" />
        </div>
        <p id="auth-error" class="form-err hidden"></p>
        <button class="btn btn-primary" onclick="login()">AUTHENTICATE</button>
        <p class="auth-switch">No account? <a href="#" onclick="showSignup(event)">Create one →</a></p>
      </div>

      <!-- Signup -->
      <div id="signup-form" class="hidden">
        <h2 class="panel-heading">CREATE ACCOUNT</h2>
        <p class="panel-sub">Pick your one song. Own it forever.</p>
        <div class="field-group">
          <label class="field-label">USERNAME</label>
          <input id="signup-username" type="text" class="field-input" placeholder="yourname" autocomplete="username" />
        </div>
        <div class="field-group">
          <label class="field-label">EMAIL</label>
          <input id="signup-email" type="email" class="field-input" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field-group">
          <label class="field-label">PASSWORD</label>
          <input id="signup-password" type="password" class="field-input" placeholder="6+ characters" autocomplete="new-password" onkeydown="if(event.key==='Enter') signup()" />
        </div>
        <button class="btn btn-primary" onclick="signup()">CREATE ACCOUNT</button>
        <p class="auth-switch">Have an account? <a href="#" onclick="showLogin(event)">Sign in →</a></p>
      </div>

    </div>
  </div>

  <!-- ── APP SHELL ─────────────────────────────────────── -->
  <div id="app-container" class="hidden">

    <!-- Top HUD bar — brand + user -->
    <header class="topbar">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="1"/>
          <path d="M15 13 L15 27 L29 20 Z" fill="currentColor"/>
        </svg>
        <span class="brand-name">ONESONG</span>
      </div>
      <div class="topbar-right">
        <span class="user-chip">
          <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
          <span id="user-label"></span>
        </span>
        <button class="btn-text" onclick="logout()">SIGN OUT</button>
      </div>
    </header>

    <!-- ── NOW PLAYING ──────────────────────────────────── -->
    <div id="now-playing" class="screen hidden">

      <!-- Song identity — top-center floating tag -->
      <div class="song-identity">
        <p id="song-artist" class="song-artist">—</p>
        <h1 id="song-title" class="song-title">—</h1>
        <p id="analysis-status" class="analysis-status"></p>
      </div>

      <!-- Waveform bars — decorative -->
      <div class="waveform" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <!-- Bottom HUD transport bar -->
      <div class="transport-bar">

        <!-- Spectrum progress track — full width, transform:scaleX -->
        <div class="progress-wrap">
          <div class="progress-track"
               onclick="seekTo(event.offsetX / this.offsetWidth * parseFloat(document.getElementById('seek-slider').max))">
            <div id="progress-fill" class="progress-fill"></div>
            <!-- Glow pulse element driven by uHigh via JS class -->
            <div id="progress-glow" class="progress-glow"></div>
          </div>
          <input id="seek-slider" type="range" min="0" max="300" step="0.1" value="0"
                 class="sr-only" oninput="seekTo(this.value)" />
        </div>

        <!-- Controls row -->
        <div class="controls-row">
          <div class="controls-left">
            <span id="time-cur" class="time-label">0:00</span>
            <span class="time-sep">/</span>
            <span id="time-tot" class="time-label">—:——</span>
          </div>

          <div class="controls-center">
            <!-- Change song -->
            <button class="hud-btn" title="Change song" onclick="showSongSelection()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <path d="M4 6h16M4 12h10M4 18h7"/>
                <path d="M19 15l3 3-3 3"/>
              </svg>
            </button>

            <!-- Play / Pause -->
            <button id="play-btn" class="hud-btn play-btn" onclick="togglePlay()" disabled title="Play / Pause">
              <span id="ico-play">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
              </span>
              <span id="ico-pause" class="hidden">
                <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
              </span>
            </button>

            <!-- Volume -->
            <div class="vol-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <path d="M11 5L6 9H2v6h4l5 4V5z"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              </svg>
              <input id="vol-slider" type="range" min="0" max="1" step="0.01" value="0.85"
                     class="vol-slider" oninput="setVolume(this.value)" />
            </div>
          </div>

          <div class="controls-right">
            <!-- Spectrum dots — visual accent, driven by CSS -->
            <div class="spec-dots" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
          </div>
        </div>

      </div><!-- /.transport-bar -->
    </div><!-- /#now-playing -->

    <!-- ── SONG SELECTION ───────────────────────────────── -->
    <div id="song-selection" class="screen hidden">
      <div class="hud-panel upload-panel">
        <div class="panel-header-row">
          <h2 class="panel-heading">YOUR SONG</h2>
          <button id="cancel-btn" class="btn-text hidden" onclick="cancelSongSelection()">← BACK</button>
        </div>
        <p class="panel-sub">Upload an audio file. One song. Make it count.</p>

        <div class="field-group">
          <label class="field-label">SONG TITLE</label>
          <input id="inp-song" type="text" class="field-input" placeholder="Song title" />
        </div>
        <div class="field-group">
          <label class="field-label">ARTIST</label>
          <input id="inp-artist" type="text" class="field-input" placeholder="Artist name" />
        </div>

        <div class="field-group">
          <label class="field-label">AUDIO FILE</label>
          <label class="file-drop" for="inp-file">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <span id="file-label">CHOOSE FILE</span>
            <small>MP3 · WAV · FLAC · OGG · M4A · MAX 50MB</small>
          </label>
          <input id="inp-file" type="file"
                 accept=".mp3,.wav,.flac,.ogg,.m4a,.aac,.opus,.weba"
                 class="sr-only" onchange="onFileSelected(this)" />
        </div>

        <div id="upload-bar-wrap" class="upload-bar-wrap hidden">
          <div id="upload-bar" class="upload-bar"></div>
        </div>

        <p id="form-err" class="form-err hidden"></p>

        <button class="btn btn-primary" onclick="saveSong()">UPLOAD &amp; VISUALIZE</button>
      </div>
    </div><!-- /#song-selection -->

  </div><!-- /#app-container -->

  <!-- Scripts — order critical -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/misc/GPUComputationRenderer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="gradientController.js"></script>
  <script src="ambient.js"></script>
  <script src="app.js"></script>

  <!-- uHigh → progress glow bridge -->
  <script>
    // Lightweight RAF bridge: reads uHigh from Ambient audio state
    // and drives the progress bar glow intensity via CSS custom property.
    // Runs outside the main render loop — no WebGL coupling.
    (function hudBridge() {
      const glow = document.getElementById('progress-glow');
      const bar  = document.getElementById('app-container');
      let   prev = 0;
      function tick() {
        requestAnimationFrame(tick);
        // Ambient exposes _audio indirectly; we tap the DOM class set by app.js
        const playing = document.body.classList.contains('is-playing');
        if (!playing) { prev *= 0.85; } 
        // Glow intensity is set by app.js calling a global hook (see below)
        if (glow) glow.style.setProperty('--glow-intensity', prev.toFixed(3));
      }
      tick();
      // Hook for app.js to push uHigh each analysis frame
      window._setHudHighFreq = function(v) { prev = v; };
    })();
  </script>

</body>
</html>
